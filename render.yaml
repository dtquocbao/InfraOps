# Render Blueprint — InfraOps AI backend
# Full guide: docs/PRODUCTION.md
#
# Render Free tier does NOT support type: worker background services.
# BullMQ processors run embedded inside the API container (see apps/api/docker-entrypoint.sh).
#
# Required manual env vars (Dashboard → infraops-api → Environment):
#   DATABASE_URL  — Postgres WITH pgvector (Neon or Supabase)
#   REDIS_URL     — Render Key Value, Upstash, or Redis Cloud
#   WEB_ORIGIN    — Vercel frontend URL, e.g. https://your-app.vercel.app

services:
  - type: web
    name: infraops-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
