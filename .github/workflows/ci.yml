name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://infraops:infraops@localhost:5432/infraops
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-secret-min-16-chars
  NODE_ENV: test
  FEATURE_TEST_MIN_PASS_RATE: '0.8'
  FEATURE_TEST_REPORT_PATH: feature-test-report.json

jobs:
  # ── Stage 1: static quality gates ──────────────────────────────────────────
  quality:
    name: Quality (lint · typecheck · unit · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build workspace packages
        run: npm run build -w @infraops/shared -w @infraops/ai-tools

      - name: Generate Prisma client
        run: npm run db:generate -w @infraops/api

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Unit tests
        run: npm run test

      - name: Build all packages
        run: npm run build

  # ── Stage 2: integration / feature / smoke (requires Postgres + Redis) ─────
  integration:
    name: Integration (feature suite · API smoke)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: infraops
          POSTGRES_PASSWORD: infraops
          POSTGRES_DB: infraops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infraops -d infraops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build packages for runtime
        run: |
          npm run build -w @infraops/shared
          npm run build -w @infraops/ai-tools
          npm run db:generate -w @infraops/api
          npm run build -w @infraops/api
          npm run build -w @infraops/worker

      - name: Migrate database
        run: npm run db:migrate -w @infraops/api

      - name: Seed database
        run: npm run db:seed -w @infraops/api

      - name: Feature test suite
        run: npm run test:features

      - name: Upload feature test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-test-report
          path: feature-test-report.json
          if-no-files-found: ignore

      - name: Start API and worker
        run: |
          npm run start -w @infraops/api > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          npm run start -w @infraops/worker > /tmp/worker.log 2>&1 &
          echo $! > /tmp/worker.pid
          sleep 3

      - name: HTTP smoke tests
        run: npm run test:smoke
        env:
          SMOKE_API_URL: http://127.0.0.1:3000

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            /tmp/api.log
            /tmp/worker.log
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: |
          kill $(cat /tmp/api.pid) 2>/dev/null || true
          kill $(cat /tmp/worker.pid) 2>/dev/null || true

  # ── Stage 3: deploy gate (must be green before production) ─────────────────
  deploy-gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: always()
    steps:
      - name: Require all checks green
        run: |
          echo "quality=${{ needs.quality.result }}"
          echo "integration=${{ needs.integration.result }}"
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::Deploy gate FAILED — fix quality/integration before production deploy"
            exit 1
          fi
          echo "Deploy gate PASSED — safe to promote to production"
