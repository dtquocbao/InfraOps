services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: infraops
      POSTGRES_PASSWORD: infraops
      POSTGRES_DB: infraops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infraops -d infraops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://infraops:infraops@postgres:5432/infraops
      REDIS_URL: redis://redis:6379
      JWT_SECRET: infraops-dev-jwt-secret-min-16-chars
      NODE_ENV: production
      WEB_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://infraops:infraops@postgres:5432/infraops
      REDIS_URL: redis://redis:6379
      JWT_SECRET: infraops-dev-jwt-secret-min-16-chars
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:3000
    depends_on:
      - api

volumes:
  postgres_data:
